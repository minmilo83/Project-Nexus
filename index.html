<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nexus | Mimi's Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="console-wrapper">
        <header>
            <div class="top-bar">
                <div class="status">
                    <span class="pulse-dot"></span>
                    <span id="node-id">SYSTEM: ONLINE / NODE_MIMI</span>
                </div>
                <div class="clock" id="live-clock">00:00:00</div>
            </div>
            
            <div class="hero">
                <h1>PROJECT <span class="gradient-text">NEXUS</span></h1>
                <p class="glitch-text">GitHub 儲存庫自動化整合介面 V1.5</p>
                <div class="header-line"></div>
            </div>
        </header>

        <main>
            <section class="module">
                <h2 class="module-title">/ [ SECTION_01: FEATURED_WORKS ]</h2>
                <div class="grid-container" id="featured-grid">
                    </div>
            </section>

            <section class="module">
                <h2 class="module-title">/ [ SECTION_02: ARCHIVE_SCRIPTS ]</h2>
                <div class="grid-container" id="other-grid">
                    </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <p>© 2026 A minmilo83 Production. All rights reserved.</p>
                <p class="system-version">SYSTEM_OS: VIBE-OS-GLASS.83</p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                               now.getMinutes().toString().padStart(2, '0') + ":" + 
                               now.getSeconds().toString().padStart(2, '0');
            document.getElementById('live-clock').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
