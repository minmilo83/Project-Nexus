<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nexus | Mimi's Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="console-wrapper">
        <header>
            <div class="top-bar">
                <div class="status">
                    <span class="pulse-dot"></span>
                    <span class="system-text">SYSTEM: ONLINE</span>
                </div>
                <div class="clock" id="live-clock">00:00:00</div>
            </div>
            
            <div class="hero">
                <h1>PROJECT <span class="gradient-text">NEXUS</span></h1>
                <p class="glitch-text">GitHub 儲存庫自動化整合介面 V1.2</p>
            </div>
        </header>

        <main>
            <section class="module">
                <h2 class="module-title">// FEATURED_WORKS</h2>
                <div class="grid-container" id="featured-grid">
                    </div>
            </section>

            <section class="module">
                <h2 class="module-title">// ARCHIVE_SCRIPTS</h2>
                <div class="grid-container" id="other-grid">
                    </div>
            </section>
        </main>

        <footer>
            <p>© 2026 A minmilo83 Production. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
